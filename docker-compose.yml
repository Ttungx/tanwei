# 探微 (Tanwei) - EdgeAgent 本地闭环仿真系统
# 四容器微服务架构编排配置

services:
  # ============================================================
  # 容器 1：LLM 推理引擎 (llm-service)
  # 工程定位：提供 Qwen3.5-0.8B 大模型的本地推理 API
  # 技术栈：llama.cpp server 模式（C/C++，极低资源消耗）
  # ============================================================
  llm-service:
    build:
      context: ./llm-service
      dockerfile: Dockerfile
    container_name: tanwei-llm-service
    ports:
      - "8080:8080"
    volumes:
      - ./qwen3.5-0.8b:/models:ro
    command: >
      --model /models/Qwen3.5-0.8B-Q4_K_M.gguf
      --host 0.0.0.0
      --port 8080
      --ctx-size 2048
      --n-gpu-layers 0
      --threads 2
      --memory-f32 0
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    networks:
      - tanwei-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================
  # 容器 2：前置轻量级过滤服务 (svm-filter-service)
  # 工程定位：第一级漏斗，微秒级过滤 99% 高置信度正常流量
  # 技术栈：Python 3.10-slim + FastAPI + scikit-learn
  # ============================================================
  svm-filter-service:
    build:
      context: ./svm-filter-service
      dockerfile: Dockerfile
    container_name: tanwei-svm-filter
    ports:
      - "8001:8001"
    volumes:
      - ./svm-filter-service/models:/app/models:ro
    environment:
      - SVM_MODEL_PATH=/app/models/svm_model.pkl
      - LOG_LEVEL=INFO
    deploy:
      resources:
        limits:
          memory: 300M
        reservations:
          memory: 128M
    networks:
      - tanwei-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ============================================================
  # 容器 3：智能体主控程序 (agent-loop)
  # 工程定位：EdgeAgent 核心大脑，五阶段工作流执行
  # 技术栈：Python 3.10-slim + scapy + FastAPI
  # ============================================================
  agent-loop:
    build:
      context: ./agent-loop
      dockerfile: Dockerfile
    container_name: tanwei-agent-loop
    ports:
      - "8002:8002"
    volumes:
      - ./TrafficLLM-master:/app/TrafficLLM:ro
      - ./agent-loop/uploads:/app/uploads
    environment:
      - SVM_SERVICE_URL=http://svm-filter-service:8001
      - LLM_SERVICE_URL=http://llm-service:8080
      - MAX_TIME_WINDOW=60
      - MAX_PACKET_COUNT=10
      - MAX_TOKEN_LENGTH=690
      - LOG_LEVEL=INFO
    depends_on:
      - llm-service
      - svm-filter-service
    deploy:
      resources:
        limits:
          memory: 500M
        reservations:
          memory: 256M
    networks:
      - tanwei-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================
  # 容器 4：本地测试与可视化控制台 (edge-test-console)
  # 工程定位：测试发包探针与 Demo 演示看板
  # 技术栈：Vue 3 (前端) + FastAPI (后端代理)
  # ============================================================
  edge-test-console:
    build:
      context: ./edge-test-console
      dockerfile: Dockerfile
    container_name: tanwei-test-console
    ports:
      - "3000:8000"
    environment:
      - AGENT_LOOP_URL=http://agent-loop:8002
      - LOG_LEVEL=INFO
    depends_on:
      - agent-loop
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - tanwei-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

# ============================================================
# 网络配置：内部隔离网络，模拟边缘设备环境
# ============================================================
networks:
  tanwei-internal:
    driver: bridge
    internal: false  # 允许外部访问测试控制台

# ============================================================
# 卷配置：持久化数据存储
# ============================================================
volumes:
  uploads:
