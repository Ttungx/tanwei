# 探微 (Tanwei) - Console + Edge + Central 协同仿真系统
# 五容器微服务架构编排配置

services:
  # ============================================================
  # 容器 1：LLM 推理引擎 (llm-service)
  # 工程定位：提供 Qwen3.5-0.8B 大模型的本地推理 API
  # 技术栈：llama.cpp server 模式（C/C++，极低资源消耗）
  # ============================================================
  llm-service:
    build:
      context: ./llm-service
      dockerfile: Dockerfile
    container_name: tanwei-llm-service
    ports:
      - "8080:8080"
    volumes:
      - ../../qwen3.5-0.8b:/models:ro
    command: >
      --model /models/Qwen3.5-0.8B-Q4_K_M.gguf
      --host 0.0.0.0
      --port 8080
      --ctx-size 2048
      --n-gpu-layers 0
      --threads 2
      --memory-f32 0
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    networks:
      - tanwei-internal
    restart: "no"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5

  # ============================================================
  # 容器 2：前置轻量级过滤服务 (svm-filter-service)
  # 工程定位：第一级漏斗，微秒级过滤 99% 高置信度正常流量
  # 技术栈：Python 3.10-slim + FastAPI + scikit-learn
  # ============================================================
  svm-filter-service:
    build:
      context: .
      dockerfile: svm-filter-service/Dockerfile
    container_name: tanwei-svm-filter
    ports:
      - "8001:8001"
    volumes:
      - ./svm-filter-service/models:/app/models:ro
    environment:
      - SVM_MODEL_PATH=/app/models/svm_model.pkl
      - LOG_LEVEL=INFO
    deploy:
      resources:
        limits:
          memory: 300M
        reservations:
          memory: 128M
    networks:
      - tanwei-internal
    restart: "no"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  # ============================================================
  # 容器 3：边缘智能体主控程序 (edge-agent)
  # 工程定位：edge-agent 核心大脑，五阶段工作流执行
  # 技术栈：Python 3.10-slim + scapy + FastAPI
  # 当前现实：edge-agent 默认自动上报 central-agent，失败仅告警不阻断本地完成
  # ============================================================
  edge-agent:
    build:
      context: .
      dockerfile: edge-agent/Dockerfile
    container_name: tanwei-edge-agent
    ports:
      - "8002:8002"
    volumes:
      - ../../TrafficLLM-master:/app/TrafficLLM:ro
      - ./edge-agent/uploads:/app/uploads
    environment:
      - SVM_SERVICE_URL=http://svm-filter-service:8001
      - LLM_SERVICE_URL=http://llm-service:8080
      - MAX_TIME_WINDOW=60
      - MAX_PACKET_COUNT=10
      - MAX_TOKEN_LENGTH=690
      - LOG_LEVEL=INFO
      - CENTRAL_AGENT_URL=http://central-agent:8003
      - CENTRAL_AGENT_TIMEOUT_SECONDS=5
      - EDGE_ID=edge1
    depends_on:
      llm-service:
        condition: service_healthy
      svm-filter-service:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 500M
        reservations:
          memory: 256M
    networks:
      - tanwei-internal
    restart: "no"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  # ============================================================
  # 容器 4：中心智能体 (central-agent)
  # 工程定位：消费边缘侧结构化情报，提供中心归档与分析接口
  # 技术栈：Python 3.10-slim + FastAPI
  # ============================================================
  central-agent:
    build:
      context: .
      dockerfile: central-agent/Dockerfile
    container_name: tanwei-central-agent
    env_file:
      - ../../.env
    ports:
      - "8003:8003"
    environment:
      - LOG_LEVEL=INFO
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - tanwei-internal
    restart: "no"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3

  # ============================================================
  # 容器 5：统一控制台 (console)
  # 工程定位：统一管理员控制台，管理 edge-agent 与后续 central-agent
  # 技术栈：React 18 (前端) + FastAPI (后端代理)
  # ============================================================
  console:
    build:
      context: .
      dockerfile: console/Dockerfile
    container_name: tanwei-console
    ports:
      - "3000:8000"
    environment:
      - EDGE_AGENT_URL=http://edge-agent:8002
      - CENTRAL_AGENT_URL=http://central-agent:8003
      - LOG_LEVEL=INFO
    depends_on:
      edge-agent:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - tanwei-internal
    restart: "no"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3

  # ============================================================
  # 容器 5：云侧综合研判服务 (central-agent)
  # 工程定位：接收各 edge 的结构化 JSON 情报，并按 edge/全网触发综合分析
  # 技术栈：Python 3.10-slim + FastAPI + SQLite
  # ============================================================
  central-agent:
    build:
      context: .
      dockerfile: central-agent/Dockerfile
    container_name: tanwei-central-agent
    ports:
      - "8003:8003"
    env_file:
      - .env
    environment:
      - CENTRAL_AGENT_DB_PATH=/app/data/central-agent.db
      - EXTERNAL_LLM_BASE_URL=${EXTERNAL_LLM_BASE_URL:-}
      - EXTERNAL_LLM_API_KEY=${EXTERNAL_LLM_API_KEY:-}
      - EXTERNAL_LLM_MODEL=${EXTERNAL_LLM_MODEL:-gpt-4o-mini}
      - EXTERNAL_LLM_TIMEOUT_SECONDS=${EXTERNAL_LLM_TIMEOUT_SECONDS:-45}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - central-agent-data:/app/data
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - tanwei-internal
    restart: "no"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3

# ============================================================
# 网络配置：内部隔离网络，模拟边缘设备环境
# ============================================================
networks:
  tanwei-internal:
    driver: bridge
    internal: false  # 允许外部访问测试控制台

# ============================================================
# 卷配置：持久化数据存储
# ============================================================
volumes:
  uploads:
  central-agent-data:
